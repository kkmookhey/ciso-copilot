AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Feature-dev fixtures for AI Visibility v2 Slice E1/E2 verification.

  Deploys Bedrock + SageMaker + Lambda + S3 resources with INTENTIONAL
  security gaps so Shasta's AWS-AI checks fire and produce findings we
  can use to verify the framework_registry crosswalk rules.

  Every resource is tagged Purpose=ciso-copilot-feature-dev for easy
  identification + tear-down.

  Teardown (single command, no orphans expected — buckets stay empty):
    aws cloudformation delete-stack --stack-name CisoBriefFeatureDevAiResources

  Cost ceiling (~$1/month idle):
    - SageMaker notebook STOPPED: ~$0 (EBS storage ~$0.10/mo)
    - SageMaker notebook RUNNING: ~$0.05/hr (~$36/mo) — STOP MANUALLY POST-DEPLOY
    - Bedrock guardrail, IAM, S3 (empty), Lambda, ModelGroup: ~$0
    - Lambda CloudWatch logs: pennies/mo (function returns immediately)

Parameters:
  TagPurpose:
    Type: String
    Default: ciso-copilot-feature-dev
    Description: Tag value identifying these as feature-dev fixtures

Resources:
  # ===========================================================================
  # S3 buckets — training data + model artifacts. Intentional gaps:
  # no SSE-KMS, no versioning, no SSL-only, no public-access-block. These
  # fire Shasta's check_s3_training_data_encrypted, _versioned, and the
  # general s3-* checks when the bucket is recognized as ML by name pattern.
  # ===========================================================================
  TrainingDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub ai-feature-dev-training-data-${AWS::AccountId}
      Tags:
        - Key: Purpose
          Value: !Ref TagPurpose
        - Key: AutoDelete
          Value: 'true'
        - Key: Workload
          Value: ai

  ModelArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub ai-feature-dev-model-artifacts-${AWS::AccountId}
      Tags:
        - Key: Purpose
          Value: !Ref TagPurpose
        - Key: AutoDelete
          Value: 'true'
        - Key: Workload
          Value: ai

  # ===========================================================================
  # SageMaker execution role with AdministratorAccess. Fires Shasta's
  # iam-overprivileged-user (and the resource is recognized as an ML role
  # via the sagemaker.amazonaws.com principal).
  # ===========================================================================
  SageMakerOverprivilegedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ai-feature-dev-sagemaker-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: Purpose
          Value: !Ref TagPurpose
        - Key: Workload
          Value: ai

  # ===========================================================================
  # SageMaker notebook. Fires:
  #   - check_sagemaker_notebook_root_access (RootAccess=Enabled)
  #   - check_sagemaker_training_vpc          (DirectInternetAccess=Enabled, no SubnetId)
  #   - check_sagemaker_endpoint_encryption   (no KmsKeyId on volume)
  # IMPORTANT: notebooks start in 'InService' (running). STOP MANUALLY after
  # deploy via console or:
  #   aws sagemaker stop-notebook-instance --notebook-instance-name ai-feature-dev-nb
  # ===========================================================================
  SageMakerNotebook:
    Type: AWS::SageMaker::NotebookInstance
    Properties:
      NotebookInstanceName: ai-feature-dev-nb
      InstanceType: ml.t3.medium
      RoleArn: !GetAtt SageMakerOverprivilegedRole.Arn
      DirectInternetAccess: Enabled
      RootAccess: Enabled
      Tags:
        - Key: Purpose
          Value: !Ref TagPurpose
        - Key: Workload
          Value: ai

  # ===========================================================================
  # SageMaker model registry group. Fires:
  #   - check_sagemaker_model_approval        (no approval workflow)
  #   - check_sagemaker_model_registry_access (default group ACL)
  # ===========================================================================
  SageMakerModelGroup:
    Type: AWS::SageMaker::ModelPackageGroup
    Properties:
      ModelPackageGroupName: ai-feature-dev-models
      ModelPackageGroupDescription: Feature-dev model registry — no approval workflow
      Tags:
        - Key: Purpose
          Value: !Ref TagPurpose
        - Key: Workload
          Value: ai

  # ===========================================================================
  # NO Bedrock guardrail is created intentionally. AWS won't accept an empty
  # guardrail (must have ≥1 policy). Skipping the resource is better
  # verification: Shasta's check_bedrock_content_filter fires at HIGH severity
  # when NO guardrails exist account-wide, whereas a misconfigured one with
  # one weak filter passes the same check. The check_bedrock_vpc_endpoint
  # check fires regardless (no Bedrock VPC endpoint in the account).
  # ===========================================================================

  # ===========================================================================
  # Lambda execution role + Lambda function with hardcoded fake AI API keys
  # in env vars. Fires check_lambda_ai_api_keys_not_hardcoded.
  # ===========================================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ai-feature-dev-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Purpose
          Value: !Ref TagPurpose

  LlmHandlerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ai-feature-dev-llm-handler
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          OPENAI_API_KEY: sk-fake-test-not-a-real-key-1234567890
          ANTHROPIC_API_KEY: sk-ant-fake-test-not-a-real-key
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "hello from ai-feature-dev"}
      Tags:
        - Key: Purpose
          Value: !Ref TagPurpose
        - Key: Workload
          Value: ai

Outputs:
  TeardownCommand:
    Description: Single-command tear-down for all fixtures
    Value: !Sub aws cloudformation delete-stack --stack-name ${AWS::StackName}
  StopNotebookCommand:
    Description: Run this immediately after deploy to minimize cost
    Value: !Sub aws sagemaker stop-notebook-instance --notebook-instance-name ${SageMakerNotebook}
  TrainingBucket:
    Value: !Ref TrainingDataBucket
  ModelArtifactsBucket:
    Value: !Ref ModelArtifactsBucket
  NotebookName:
    Value: !Ref SageMakerNotebook
  ModelGroupName:
    Value: !Ref SageMakerModelGroup
  LambdaName:
    Value: !Ref LlmHandlerLambda
