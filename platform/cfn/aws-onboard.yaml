AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CISO Copilot — AWS account onboarding. Creates a read-only cross-account
  role for posture scans, an EventBridge rule that forwards security events
  to the CISO Copilot platform's central event bus, and (optionally) enables
  AWS Config so configuration-drift snapshots are available. After stack
  creation, a Lambda-backed custom resource notifies the platform that this
  account has been connected.

Parameters:
  CisoCopilotAccountId:
    Type: String
    Default: "470226123496"
    Description: AWS account ID that hosts the CISO Copilot platform. Do not change.
    AllowedPattern: "^[0-9]{12}$"

  ExternalId:
    Type: String
    NoEcho: true
    Description: >
      One-time external ID generated by the CISO Copilot app for this
      onboarding flow. Used in the cross-account role trust policy to
      prevent the confused-deputy problem.
    MinLength: 16
    MaxLength: 128
    AllowedPattern: "^[A-Za-z0-9_\\-]+$"

  CentralEventBusArn:
    Type: String
    Default: "arn:aws:events:us-east-1:470226123496:event-bus/ciso-copilot-events"
    Description: ARN of the CISO Copilot central event bus that receives forwarded events. Do not change.

  CompleteWebhookUrl:
    Type: String
    Default: "https://xoljryrb7i.execute-api.us-east-1.amazonaws.com/v1/onboarding/aws/complete"
    Description: CISO Copilot endpoint that the custom resource calls to register this connection. Do not change.

  ConnectionId:
    Type: String
    Description: >
      Connection ID generated by the CISO Copilot app for this onboarding flow.
      Surfaced back via the complete-webhook so the platform can match this stack
      to the pending connection record.

  EnableAwsConfig:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      Whether to enable AWS Config recording in this account. Recommended (gives
      us full configuration-item changes with before/after state) but adds
      AWS Config charges per recorded resource. Set to false if Config is
      already enabled by your organization.

Conditions:
  ShouldEnableConfig: !Equals [!Ref EnableAwsConfig, "true"]

Resources:

  # =====================================================================
  # Cross-account read-only role used by the pull scanner (Shasta)
  # =====================================================================

  CISOCopilotReaderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CISOCopilotReader
      Description: Read-only role assumed by the CISO Copilot platform for posture scans.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${CisoCopilotAccountId}:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
        - arn:aws:iam::aws:policy/SecurityAudit
        - arn:aws:iam::aws:policy/job-function/ViewOnlyAccess

  # =====================================================================
  # EventBridge rule forwarding security events to our central bus
  # =====================================================================

  EventForwardingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CISOCopilotEventForwarder
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: PutEventsToCentralBus
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "events:PutEvents"
                Resource: !Ref CentralEventBusArn

  SecurityEventForwardingRule:
    Type: AWS::Events::Rule
    Properties:
      Name: CISOCopilotForwardSecurityEvents
      Description: >
        Forwards GuardDuty, Inspector, Security Hub, AWS Config item changes,
        and CloudTrail security-relevant write events to the CISO Copilot
        central event bus.
      EventBusName: default
      State: ENABLED
      EventPattern:
        source:
          - aws.guardduty
          - aws.inspector2
          - aws.securityhub
          - aws.config
          - aws.cloudtrail
        detail-type:
          - GuardDuty Finding
          - Inspector2 Finding
          - Security Hub Findings - Imported
          - Configuration Item Change Notification
          - "AWS API Call via CloudTrail"
        detail:
          eventName:
            - AuthorizeSecurityGroupIngress
            - AuthorizeSecurityGroupEgress
            - RevokeSecurityGroupIngress
            - RevokeSecurityGroupEgress
            - PutBucketPolicy
            - PutBucketAcl
            - PutBucketPublicAccessBlock
            - DeletePublicAccessBlock
            - AttachUserPolicy
            - AttachRolePolicy
            - PutUserPolicy
            - PutRolePolicy
            - CreateAccessKey
            - DeactivateMFADevice
            - ConsoleLogin
            - DisableKey
            - ScheduleKeyDeletion
            - ModifyDBInstance
            - CreateDBInstance
            - ModifyDBCluster
            - UpdateClusterConfig
            - PutRestPolicy
            - CreateLoginProfile
            - UpdateLoginProfile
      Targets:
        - Id: CentralBus
          Arn: !Ref CentralEventBusArn
          RoleArn: !GetAtt EventForwardingRole.Arn

  # =====================================================================
  # AWS Config (optional) — provides full configuration-item changes
  # =====================================================================

  ConfigRecorderRole:
    Type: AWS::IAM::Role
    Condition: ShouldEnableConfig
    Properties:
      RoleName: CISOCopilotConfigRecorder
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWS_ConfigRole

  ConfigDeliveryBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldEnableConfig
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "ciso-copilot-config-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  ConfigDeliveryBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: ShouldEnableConfig
    Properties:
      Bucket: !Ref ConfigDeliveryBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSConfigBucketPermissionsCheck
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: "s3:GetBucketAcl"
            Resource: !GetAtt ConfigDeliveryBucket.Arn
          - Sid: AWSConfigBucketExistenceCheck
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: "s3:ListBucket"
            Resource: !GetAtt ConfigDeliveryBucket.Arn
          - Sid: AWSConfigBucketDelivery
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: "s3:PutObject"
            Resource: !Sub "${ConfigDeliveryBucket.Arn}/AWSLogs/${AWS::AccountId}/Config/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": "bucket-owner-full-control"

  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Condition: ShouldEnableConfig
    DependsOn: ConfigDeliveryChannel
    Properties:
      Name: CISOCopilotConfigRecorder
      RoleARN: !GetAtt ConfigRecorderRole.Arn
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: true

  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Condition: ShouldEnableConfig
    Properties:
      Name: CISOCopilotConfigDelivery
      S3BucketName: !Ref ConfigDeliveryBucket

  # =====================================================================
  # Custom resource: POST to the CISO Copilot platform to register this
  # connection. Sends role ARN + external ID + Config-enabled status.
  # =====================================================================

  RegisterConnectionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "ciso-copilot-register-${ConnectionId}"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt RegisterConnectionRole.Arn
      Code:
        ZipFile: |
          import json, urllib.request, urllib.error
          import cfnresponse

          def handler(event, context):
              status = cfnresponse.SUCCESS
              data = {}
              try:
                  if event["RequestType"] in ("Create", "Update"):
                      payload = {
                          "connection_id":          event["ResourceProperties"]["ConnectionId"],
                          "role_arn":               event["ResourceProperties"]["RoleArn"],
                          "external_id":            event["ResourceProperties"]["ExternalId"],
                          "account_id":             event["ResourceProperties"]["AccountId"],
                          "config_enabled":         event["ResourceProperties"]["ConfigEnabled"] == "true",
                          "event_rule_arn":         event["ResourceProperties"]["EventRuleArn"],
                      }
                      req = urllib.request.Request(
                          event["ResourceProperties"]["WebhookUrl"],
                          data=json.dumps(payload).encode(),
                          headers={"content-type": "application/json"},
                          method="POST",
                      )
                      with urllib.request.urlopen(req, timeout=20) as resp:
                          data["response_status"] = resp.status
              except Exception as e:
                  print(f"register failed: {e}")
                  # Don't fail the stack — the platform can retry asynchronously
                  # and the customer's resources are already created correctly.
                  data["error"] = str(e)
              cfnresponse.send(event, context, status, data)

  RegisterConnectionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  RegisterConnection:
    Type: Custom::CISOCopilotRegister
    Properties:
      ServiceToken: !GetAtt RegisterConnectionFunction.Arn
      WebhookUrl: !Ref CompleteWebhookUrl
      ConnectionId: !Ref ConnectionId
      RoleArn: !GetAtt CISOCopilotReaderRole.Arn
      ExternalId: !Ref ExternalId
      AccountId: !Ref AWS::AccountId
      ConfigEnabled: !Ref EnableAwsConfig
      EventRuleArn: !GetAtt SecurityEventForwardingRule.Arn

Outputs:
  ReaderRoleArn:
    Description: ARN of the cross-account role created for CISO Copilot to assume.
    Value: !GetAtt CISOCopilotReaderRole.Arn

  EventForwardingRuleArn:
    Description: ARN of the EventBridge rule forwarding security events.
    Value: !GetAtt SecurityEventForwardingRule.Arn

  ConfigEnabled:
    Description: Whether AWS Config was enabled by this stack.
    Value: !Ref EnableAwsConfig
